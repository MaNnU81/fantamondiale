<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantacalcio Mondiali</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚽ Fantacalcio Mondiali</h1>
  <p>Tocca ✏️ per aggiornare i punti di una nazionale</p>
  <div class="status-bar">
    <div class="status-dot" id="sdot"></div>
    <span id="stxt">caricamento...</span>
  </div>
</header>

<div class="leader-banner">
  <div class="leader-inner" id="leader">—</div>
</div>

<div class="scoreboard">
  <div class="player-card chiara">
    <div class="player-header">
      <div class="player-name">Chiara</div>
      <div class="player-total" id="chiara-total">0 pt</div>
    </div>
    <div id="chiara-nations"></div>
    <div class="matches-section">
      <div class="matches-title">Partite</div>
      <div id="chiara-matches" class="matches-loading">caricamento...</div>
    </div>
  </div>
  <div class="player-card mannu">
    <div class="player-header">
      <div class="player-name">Mannu</div>
      <div class="player-total" id="mannu-total">0 pt</div>
    </div>
    <div id="mannu-nations"></div>
    <div class="matches-section">
      <div class="matches-title">Partite</div>
      <div id="mannu-matches" class="matches-loading">caricamento...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Modifica</div>
    <div class="score-grid">
      <div class="score-field">
        <label>Vittorie</label>
        <div class="counter">
          <button class="counter-btn" data-target="inp-wins" data-delta="-1">−</button>
          <input type="number" id="inp-wins" min="0" value="0" readonly>
          <button class="counter-btn" data-target="inp-wins" data-delta="1">+</button>
        </div>
      </div>
      <div class="score-field">
        <label>Pareggi</label>
        <div class="counter">
          <button class="counter-btn" data-target="inp-draws" data-delta="-1">−</button>
          <input type="number" id="inp-draws" min="0" value="0" readonly>
          <button class="counter-btn" data-target="inp-draws" data-delta="1">+</button>
        </div>
      </div>
    </div>
    <div class="phase-label">Fasi raggiunte (cumulabili)</div>
    <div class="bonus-grid">
      <div class="bonus-btn" data-phase="5">Gironi +5</div>
      <div class="bonus-btn" data-phase="8">Quarti +8</div>
      <div class="bonus-btn" data-phase="12">Semifinale +12</div>
      <div class="bonus-btn" data-phase="18">Finale +18</div>
      <div class="bonus-btn" data-phase="30">🏆 Campione +30</div>
    </div>
    <div class="pts-preview">Punti totali: <strong id="pts-prev">0</strong></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="saveNation()">Salva</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
