<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantacalcio Mondiali</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --chiara-mid: #A78BFA;
    --chiara-bg: #2D1B69;
    --chiara-border: #7C3AED;
    --mannu-mid: #34D399;
    --mannu-bg: #064E3B;
    --mannu-border: #059669;
    --bg: #0F0F0F;
    --surface: #1A1A1A;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #F5F5F5;
    --text-muted: #777;
    --radius: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 3rem; }
  header { text-align: center; padding: 2rem 1rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 8vw, 3.2rem); letter-spacing: 0.04em; color: #fff; line-height: 1; }
  header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
  .status-bar { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-top: 8px; min-height: 18px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
  .status-dot.ok { background: #34D399; }
  .status-dot.err { background: #F87171; }
  .leader-banner { max-width: 760px; margin: 0 auto 12px; padding: 0 12px; }
  .leader-inner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
  .chiara-color { color: var(--chiara-mid); }
  .mannu-color { color: var(--mannu-mid); }
  .scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 760px; margin: 0 auto; padding: 0 12px; }
  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .player-header { padding: 13px 14px 11px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .player-name { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .chiara .player-name { color: var(--chiara-mid); }
  .mannu .player-name { color: var(--mannu-mid); }
  .player-total { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.03em; line-height: 1; }
  .chiara .player-total { color: var(--chiara-mid); }
  .mannu .player-total { color: var(--mannu-mid); }
  .nation-row { display: flex; align-items: center; gap: 7px; padding: 8px 12px; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .nation-row:last-child { border-bottom: none; }
  .nation-row:hover { background: var(--surface2); }
  .flag { font-size: 17px; min-width: 22px; text-align: center; }
  .nation-name { font-size: 12px; color: var(--text); flex: 1; }
  .nation-pts { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 28px; text-align: right; }
  .nation-pts.hi { color: var(--text); }
  .edit-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; color: var(--text-muted); font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; flex-shrink: 0; }
  .edit-btn:hover { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 1.25rem; width: 100%; max-width: 310px; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .score-field label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .score-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 20px; font-weight: 600; text-align: center; padding: 8px; font-family: 'Bebas Neue', sans-serif; }
  .score-field input:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .phase-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .bonus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1rem; }
  .bonus-btn { padding: 7px 4px; font-size: 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.12s; }
  .bonus-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
  .bonus-btn.active { background: var(--chiara-bg); border-color: var(--chiara-border); color: var(--chiara-mid); font-weight: 600; }
  .pts-preview { text-align: center; padding: 9px; background: var(--surface2); border-radius: 8px; margin-bottom: 1rem; font-size: 13px; color: var(--text-muted); }
  .pts-preview strong { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); letter-spacing: 0.03em; margin-left: 6px; }
  .modal-footer { display: flex; gap: 8px; }
  .btn-cancel { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text-muted); cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
  .btn-save { flex: 2; padding: 10px; border: 1px solid var(--chiara-border); border-radius: 8px; background: var(--chiara-bg); color: var(--chiara-mid); cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; }
  .btn-save:hover { opacity: 0.85; }
  @media (max-width: 420px) { .nation-name { font-size: 10px; } .player-total { font-size: 20px; } }
</style>
</head>
<body>

<header>
  <h1>⚽ Fantacalcio Mondiali</h1>
  <p>Tocca ✏️ per aggiornare i punti di una nazionale</p>
  <div class="status-bar">
    <div class="status-dot" id="sdot"></div>
    <span id="stxt">caricamento...</span>
  </div>
</header>

<div class="leader-banner">
  <div class="leader-inner" id="leader">—</div>
</div>

<div class="scoreboard">
  <div class="player-card chiara">
    <div class="player-header">
      <div class="player-name">Chiara</div>
      <div class="player-total" id="chiara-total">0 pt</div>
    </div>
    <div id="chiara-nations"></div>
  </div>
  <div class="player-card mannu">
    <div class="player-header">
      <div class="player-name">Mannu</div>
      <div class="player-total" id="mannu-total">0 pt</div>
    </div>
    <div id="mannu-nations"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Modifica</div>
    <div class="score-grid">
      <div class="score-field"><label>Vittorie</label><input type="number" id="inp-wins" min="0" value="0"></div>
      <div class="score-field"><label>Pareggi</label><input type="number" id="inp-draws" min="0" value="0"></div>
    </div>
    <div class="phase-label">Fase raggiunta</div>
    <div class="bonus-grid">
      <div class="bonus-btn" data-phase="0" onclick="selectPhase(0)">Nessuna</div>
      <div class="bonus-btn" data-phase="5" onclick="selectPhase(5)">Gironi +5</div>
      <div class="bonus-btn" data-phase="8" onclick="selectPhase(8)">Quarti +8</div>
      <div class="bonus-btn" data-phase="12" onclick="selectPhase(12)">Semifinale +12</div>
      <div class="bonus-btn" data-phase="18" onclick="selectPhase(18)">Finale +18</div>
      <div class="bonus-btn" data-phase="30" onclick="selectPhase(30)">🏆 Campione +30</div>
    </div>
    <div class="pts-preview">Punti totali: <strong id="pts-prev">0</strong></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="saveNation()">Salva</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzHa5LtE26ccB_h3rCriHNVCitVbK2aBfBo8D_QHd9dT3TwS1HOLKczZogMsakPw2vm/exec';
const NATIONS = {
  chiara: [
    {name:'Brasile',flag:'🇧🇷'},{name:'Portogallo',flag:'🇵🇹'},{name:'Norvegia',flag:'🇳🇴'},
    {name:'England',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{name:'Paesi Bassi',flag:'🇳🇱'},{name:'Corea del Sud',flag:'🇰🇷'},
    {name:'Turchia',flag:'🇹🇷'},{name:'Belgio',flag:'🇧🇪'}
  ],
  mannu: [
    {name:'Spagna',flag:'🇪🇸'},{name:'Francia',flag:'🇫🇷'},{name:'Argentina',flag:'🇦🇷'},
    {name:'Germania',flag:'🇩🇪'},{name:'Croazia',flag:'🇭🇷'},{name:'Marocco',flag:'🇲🇦'},
    {name:'Ecuador',flag:'🇪🇨'},{name:'Giappone',flag:'🇯🇵'}
  ]
};
let state = {}, editingKey = null, selectedPhase = 0;

function calcPts(w,d,p){ return w*3+d+p; }
function setStatus(type, txt){ document.getElementById('sdot').className='status-dot '+type; document.getElementById('stxt').textContent=txt; }

function defaultState(){
  const s={};
  ['chiara','mannu'].forEach(pl=>NATIONS[pl].forEach(n=>{ s[pl+'_'+n.name]={wins:0,draws:0,phase:0}; }));
  return s;
}

async function loadState(){
  setStatus('','caricamento...');
  try {
    const r = await fetch(API+'?t='+Date.now());
    const txt = await r.text();
    const data = JSON.parse(txt);
    state = (data && typeof data==='object' && !data.error) ? data : defaultState();
    setStatus('ok','dati caricati');
  } catch(e){ state=defaultState(); setStatus('err','offline — modifiche non salvate'); }
  render();
}

async function saveState(){
  setStatus('','salvataggio...');
  try {
    await fetch(API, { method:'POST', body:JSON.stringify(state), headers:{'Content-Type':'text/plain'} });
    setStatus('ok','salvato ✓');
  } catch(e){ setStatus('err','errore salvataggio'); }
}

function render(){
  let ct=0, mt=0;
  ['chiara','mannu'].forEach(pl=>{
    const c=document.getElementById(pl+'-nations');
    c.innerHTML='';
    let tot=0;
    NATIONS[pl].forEach(n=>{
      const key=pl+'_'+n.name;
      const d=state[key]||{wins:0,draws:0,phase:0};
      const pts=calcPts(d.wins,d.draws,d.phase);
      tot+=pts;
      const row=document.createElement('div');
      row.className='nation-row';
      row.innerHTML=`<span class="flag">${n.flag}</span><span class="nation-name">${n.name}</span><span class="nation-pts ${pts>0?'hi':''}">${pts}pt</span><button class="edit-btn" onclick="openModal('${pl}','${n.name}')" aria-label="Modifica ${n.name}">✏️</button>`;
      c.appendChild(row);
    });
    document.getElementById(pl+'-total').textContent=tot+' pt';
    if(pl==='chiara') ct=tot; else mt=tot;
  });
  const b=document.getElementById('leader');
  if(ct===0&&mt===0) b.innerHTML='<span style="color:var(--text-muted)">Nessun punto ancora — si parte!</span>';
  else if(ct>mt) b.innerHTML=`🏅 In testa <strong class="chiara-color">Chiara</strong> &mdash; +${ct-mt} pt`;
  else if(mt>ct) b.innerHTML=`🏅 In testa <strong class="mannu-color">Mannu</strong> &mdash; +${mt-ct} pt`;
  else b.innerHTML=`🤝 Pari! <span class="chiara-color">${ct}</span> — <span class="mannu-color">${mt}</span> pt`;
}

function openModal(pl,name){
  editingKey=pl+'_'+name;
  const d=state[editingKey]||{wins:0,draws:0,phase:0};
  const n=NATIONS[pl].find(x=>x.name===name);
  document.getElementById('modal-title').innerHTML=`<span>${n.flag}</span> ${name}`;
  document.getElementById('inp-wins').value=d.wins;
  document.getElementById('inp-draws').value=d.draws;
  selectedPhase=d.phase;
  updatePhaseButtons(); updatePreview();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingKey=null; }
function selectPhase(p){ selectedPhase=p; updatePhaseButtons(); updatePreview(); }
function updatePhaseButtons(){ document.querySelectorAll('.bonus-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.phase)===selectedPhase)); }
function updatePreview(){ const w=parseInt(document.getElementById('inp-wins').value)||0, d=parseInt(document.getElementById('inp-draws').value)||0; document.getElementById('pts-prev').textContent=calcPts(w,d,selectedPhase); }
document.getElementById('inp-wins').addEventListener('input',updatePreview);
document.getElementById('inp-draws').addEventListener('input',updatePreview);
function saveNation(){
  if(!editingKey) return;
  state[editingKey]={ wins:parseInt(document.getElementById('inp-wins').value)||0, draws:parseInt(document.getElementById('inp-draws').value)||0, phase:selectedPhase };
  render(); closeModal(); saveState();
}
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
loadState();
</script>
</body>
</html>
